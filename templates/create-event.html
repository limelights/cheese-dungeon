{% extends "base.html" %}

{% block title %}Create Event - Event Sign-Up{% endblock %}

{% block content %}
<h2>Create a New Event</h2>

{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

<div class="form-section">
    <form method="POST">
        <div class="form-group">
            <label for="host">Host Name *</label>
            <input type="text" id="host" name="host" required placeholder="Your name">
        </div>
        
        <div class="form-group">
            <label for="event_name">Event Name *</label>
            <input type="text" id="event_name" name="event_name" required placeholder="e.g., Coffee Meetup, Team Lunch">
        </div>
        
        <div class="form-group">
            <label for="when">Date & Time *</label>
            <input type="datetime-local" id="when" name="when" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Create Event</button>
    </form>
</div>

<p style="text-align: center; color: #999; margin-top: 20px;">
    Participants can sign up after the event is created.
</p>
{% endblock %}
